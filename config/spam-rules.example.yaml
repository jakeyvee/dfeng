# =============================================================================
# Dongfeng Experience Community — anti-spam rule lists (TEMPLATE)
# Linear ticket: VOL-208 (anti-spam: crypto, suspicious links, ads, repetition)
# =============================================================================
# OPTIONAL convenience file for managing long spam rule lists outside of env
# vars. It is NOT required: the bot ships with sensible built-in DEFAULT_* lists
# (see src/dfeng_bot/handlers/antispam.py), and every key can alternatively be
# set via env (DFENG_SPAM_*). To use this file:
#
#     cp config/spam-rules.example.yaml config/spam-rules.yaml   # gitignored
#     # edit the lists below, then run the bot
#
# Precedence per rule list:  spam-rules.yaml  >  DFENG_SPAM_* env  >  built-in
# DEFAULT_* list in antispam.py. An EMPTY/omitted list here means "fall back" —
# it does NOT clear the defaults. To truly disable a category, set its feature
# off or rely on the matching toggle.
#
# Requires PyYAML to be importable; if it isn't installed this file is ignored
# (PyYAML is lazy-imported and is not a hard dependency). Point the loader at a
# different path with DFENG_SPAM_RULES_FILE.
#
# Matching semantics (see antispam.py):
#   * keywords: case-insensitive; pure alphanumeric tokens use word boundaries
#     ("pump" won't match "pumpkin"); phrases with punctuation ("whatsapp +",
#     "telegram.me/") match as case-insensitive substrings.
#   * domains: matched against the URL host (allowed_domains exempts; blocked_*
#     and shorteners flag). blocked_domains is a substring match on the host.
#
# FALSE-POSITIVE NOTE: keep rules SPECIFIC to scam/ad phrasing. Avoid generic
# words ("free", "buy") that legitimate community chatter uses. A normal message
# like "Loving my BOX on weekend trips!" must never match.
# -----------------------------------------------------------------------------

# Crypto promotions / scam phrasing.
crypto_keywords:
  - pump
  - airdrop
  - free crypto
  - 100x
  - usdt giveaway
  - pre-sale
  - guaranteed returns
  - to the moon

# External advertisements / promo unrelated to Dongfeng.
ad_keywords:
  - "telegram.me/"
  - join my channel
  - dm me
  - "whatsapp +"
  - promo code
  - link in bio

# URL shortener hosts (almost always mask scam destinations).
shortener_domains:
  - bit.ly
  - tinyurl.com
  - t.co
  - cutt.ly
  - rb.gy

# Crypto/airdrop scam domain fragments (substring match on the URL host).
blocked_domains:
  - airdrop
  - free-crypto
  - claim-
  - -giveaway

# Scam-favoured TLD suffixes.
blocked_tlds:
  - .xyz
  - .top
  - .click
  - .gq
  - .tk

# Domains ALWAYS allowed even when block_links is on (community/official links).
allowed_domains:
  - dongfeng.com

# Repetition: N identical/near-identical messages by one user within the window.
repeat_count: 3
repeat_window_seconds: 60

# Escalation (optional). 0 disables: delete + log only. Set > 0 to temporarily
# mute a user after this many removed messages in one process lifetime.
restrict_after: 0
restrict_seconds: 3600
